---
layout: default
---

<nav class="text-sm text-gray-600 mb-6">
  <a href="{{ site.baseurl }}/" class="text-purple-700 hover:underline">Home</a>
  <span class="mx-1">/</span>
  <span>{{ page.title }}</span>
</nav>

<article class="doc-page max-w-4xl mx-auto">
  <header class="mb-10">
    <p class="text-sm font-semibold tracking-[0.2em] uppercase text-purple-700">Resource Library</p>
    <h1 class="text-4xl font-bold mt-2 mb-3">{{ page.title }}</h1>
    {% if page.description %}
      <p class="text-lg text-gray-600">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="doc-content">
    {{ content }}
  </div>
</article>

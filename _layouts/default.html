<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="{{ site.author }}">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom styles -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-white text-gray-900 font-sans">
  <!-- Navigation -->
  <nav class="border-b border-gray-200 sticky top-0 bg-white z-40">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="{{ site.baseurl }}/" class="flex items-center gap-2 text-xl font-bold text-purple-700">
        📚 {{ site.title }}
      </a>
      <div class="flex gap-6 text-sm">
        <a href="{{ site.baseurl }}/" class="text-gray-700 hover:text-purple-700">Browse</a>
        <a href="https://github.com/lerlerchan/academic_research_skills" class="text-gray-700 hover:text-purple-700">GitHub</a>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 py-12">
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-200 mt-16 py-8 bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-600">
      <p>Academic Research Skills — Curated from leading researchers and practitioners</p>
      <p class="mt-2">
        <a href="https://github.com/lerlerchan/academic_research_skills" class="text-purple-700 hover:underline">GitHub</a> · 
        <a href="https://github.com/lerlerchan/academic_research_skills/blob/main/DESIGN.md" class="text-purple-700 hover:underline">Design Doc</a>
      </p>
    </div>
  </footer>

  <!-- Lunr search library -->
  <script src="https://cdn.jsdelivr.net/npm/lunr@2.3.9/lunr.min.js"></script>
  <script src="{{ site.baseurl }}/assets/js/search.js"></script>
</body>
</html>
